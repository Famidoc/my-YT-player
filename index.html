<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My YT Player</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#030712">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My YT Player">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- 載入 Tailwind CSS (僅用於靜態外框排版) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* --- 基礎捲軸與視圖動畫 --- */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4B5563; }
    .view-container { transition: opacity 0.3s ease; position: absolute; inset: 0; width: 100%; height: 100%; }
    .view-hidden { opacity: 0; pointer-events: none; z-index: -10; }
    .view-active { opacity: 1; z-index: 10; }

    /* =========================================================================
       🔥 核心抗干擾 CSS 區塊 🔥
       (徹底解決 Tailwind CDN 動態盲區與 NAS XSS 阻擋，JS 中絕對不使用 style="...")
       ========================================================================= */

    /* 1. 總影片庫網格卡片 */
    .fc-grid-card { background-color: #030712; border: 1px solid #1f2937; border-radius: 0.5rem; overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.2s; }
    .fc-grid-card:hover { border-color: #4b5563; }
    .fc-thumb-container { position: relative; width: 100%; padding-bottom: 56.25%; background-color: #000; flex-shrink: 0; }
    .fc-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .fc-overlay { position: absolute; inset: 0; background-color: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
    .fc-grid-card:hover .fc-overlay { opacity: 1; }
    
    /* 按鈕樣式 */
    .fc-btn-circle { padding: 0.5rem; border-radius: 9999px; color: white; border: none; cursor: pointer; display: flex; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: background-color 0.2s; }
    .fc-btn-blue { background-color: #2563eb; }
    .fc-btn-blue:hover { background-color: #3b82f6; }
    .fc-btn-red { background-color: #dc2626; }
    .fc-btn-red:hover { background-color: #ef4444; }
    .fc-btn-sm { padding: 6px; }

    /* 卡片文字區 */
    .fc-card-info { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; min-height: 70px; }
    .fc-card-title { font-weight: 500; font-size: 0.875rem; color: #e5e7eb; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0 0 0.5rem 0; line-height: 1.4; }
    .fc-tag { align-self: flex-start; background-color: #1f2937; color: #9ca3af; font-size: 10px; padding: 2px 6px; border-radius: 4px; }

    /* 動態分類標籤 */
    .fc-tab-active { padding: 6px 16px; border-radius: 9999px; font-size: 14px; font-weight: 500; white-space: nowrap; background-color: #2563eb; color: #fff; border: none; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .fc-tab-inactive { padding: 6px 16px; border-radius: 9999px; font-size: 14px; font-weight: 500; white-space: nowrap; background-color: #1f2937; color: #d1d5db; border: none; cursor: pointer; transition: background-color 0.2s; }
    .fc-tab-inactive:hover { background-color: #374151; color: #fff; }

    /* 2. 列表清單元件 (建立清單、播放清單) */
    .fc-list-item { display: flex; gap: 0.75rem; padding: 0.5rem; border-radius: 0.5rem; background-color: rgba(31,41,55,0.6); align-items: center; margin-bottom: 0.5rem; border: 1px solid transparent; transition: background-color 0.2s; border-left: 4px solid transparent; }
    .fc-list-item:hover { background-color: rgba(55,65,81,0.6); }
    .fc-list-item.active { background-color: #1f2937; border-left: 4px solid #ef4444; }
    .fc-list-thumb-lg { position: relative; width: 96px; height: 64px; flex-shrink: 0; background-color: #000; border-radius: 4px; overflow: hidden; }
    .fc-list-thumb-sm { position: relative; width: 64px; height: 48px; flex-shrink: 0; background-color: #000; border-radius: 4px; overflow: hidden; }
    .fc-list-info { flex: 1; min-width: 0; }
    .fc-list-title { font-weight: 500; font-size: 13px; color: #9ca3af; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .fc-list-title.active { color: #fff; }
    .fc-list-tag { display: block; font-size: 10px; color: #6b7280; margin-top: 4px; }
    .fc-idx { color: #6b7280; font-size: 12px; width: 20px; text-align: center; flex-shrink: 0; font-family: monospace; }
    .fc-list-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
    
    .fc-icon-btn { padding: 6px; color: #9ca3af; background-color: transparent; border-radius: 4px; border: none; cursor: pointer; transition: all 0.2s; display: flex; }
    .fc-icon-btn.play:hover { color: #fff; background-color: #dc2626; }
    .fc-icon-btn.play.active { color: #fff; }
    .fc-icon-btn.del:hover { color: #fff; background-color: #4b5563; }

    /* 3. 正在播放列 */
    .fc-np-img { width: 64px; height: 48px; object-fit: cover; border-radius: 4px; flex-shrink: 0; display: none; }
    @media (min-width: 640px) { .fc-np-img { display: block; } }
    .fc-np-box { flex: 1; min-width: 0; text-align: left; }
    .fc-np-title { font-weight: 600; color: #f3f4f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; margin: 0; }
    .fc-np-sub { font-size: 10px; color: #9ca3af; margin: 2px 0 0 0; }

    /* 4. 空狀態提示 & 圖示強制尺寸 */
    .fc-empty-state { grid-column: 1 / -1; padding: 3rem 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6b7280; text-align: center; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 20px; height: 20px; }
    .icon-lg { width: 24px; height: 24px; }
    .icon-xl { width: 48px; height: 48px; }
    .opacity-20 { opacity: 0.2; }
    .mb-4 { margin-bottom: 1rem; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 overflow-hidden font-sans selection:bg-red-500/30 flex flex-col md:flex-row h-[100dvh] w-full">

  <!-- ================= 側邊導覽列 ================= -->
  <div class="w-full md:w-64 bg-gray-900 border-t md:border-t-0 md:border-r border-gray-800 flex flex-row md:flex-col z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.5)] md:shadow-2xl shrink-0 h-[68px] md:h-auto order-last md:order-first">
    <!-- Logo 區塊完美對齊 -->
    <div class="hidden md:flex flex-col items-start p-6 pb-8">
      <h1 class="text-2xl font-black text-white flex items-center gap-2 tracking-tight">
        <i data-lucide="youtube" class="text-red-500 w-8 h-8 shrink-0"></i>
        <span>My YT Player</span>
      </h1>
      <p class="text-xs text-gray-500 mt-1 ml-10 uppercase tracking-wider font-semibold">智慧播放中樞</p>
    </div>
    
    <nav class="flex-1 px-1 md:px-3 flex flex-row md:flex-col justify-around md:justify-start items-center md:items-stretch space-y-0 md:space-y-1.5 py-1 md:py-0" id="nav-menu">
      <button onclick="switchTab('player')" id="nav-player" class="w-full flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 px-1 md:px-4 py-2 md:py-3 rounded-lg transition font-medium bg-red-600/10 text-red-500">
        <i data-lucide="play" class="w-5 h-5 md:w-5 md:h-5"></i> <span class="text-[10px] md:text-base">專屬播放</span>
      </button>
      <button onclick="switchTab('build')" id="nav-build" class="w-full flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 px-1 md:px-4 py-2 md:py-3 rounded-lg transition font-medium text-gray-400 hover:bg-gray-800 hover:text-gray-200">
        <i data-lucide="list-video" class="w-5 h-5 md:w-5 md:h-5"></i> <span class="text-[10px] md:text-base">建立清單</span>
      </button>
      <button onclick="switchTab('library')" id="nav-library" class="w-full flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 px-1 md:px-4 py-2 md:py-3 rounded-lg transition font-medium text-gray-400 hover:bg-gray-800 hover:text-gray-200">
        <i data-lucide="search" class="w-5 h-5 md:w-5 md:h-5"></i> <span class="text-[10px] md:text-base">總影片庫</span>
      </button>
      <button onclick="switchTab('settings')" id="nav-settings" class="w-full flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 px-1 md:px-4 py-2 md:py-3 rounded-lg transition font-medium text-gray-400 hover:bg-gray-800 hover:text-gray-200">
        <i data-lucide="settings" class="w-5 h-5 md:w-5 md:h-5"></i> <span class="text-[10px] md:text-base">設定同步</span>
      </button>
    </nav>
    
    <!-- 電腦版 Footer -->
    <div class="hidden md:flex flex-col p-4 text-xs text-gray-600 border-t border-gray-800 gap-2">
       <div class="flex items-center gap-2">
         <i data-lucide="info" class="w-4 h-4 shrink-0"></i> <span>資料安全儲存於本地端</span>
       </div>
       <div class="text-[10px] text-gray-500 mt-1">
         @2026 by Famidoc Chang & Gemini 3.1 pro
       </div>
    </div>
  </div>

  <!-- ================= 主要內容區塊 ================= -->
  <div class="flex-1 relative bg-gray-950 overflow-hidden min-h-0" id="main-content">
    
    <!-- 1. 播放器分頁 -->
    <div id="view-player" class="view-container view-active flex flex-col p-3 md:p-6 w-full">
      <div class="flex-1 bg-black rounded-xl overflow-hidden shadow-2xl relative border border-gray-800 flex items-center justify-center min-h-0" id="player-wrapper">
        <div id="yt-player" class="w-full h-full absolute inset-0 transition-opacity duration-300 opacity-100"></div>
        <div id="no-video-msg" class="absolute flex-col items-center justify-center text-gray-500 gap-4 flex hidden p-4 text-center">
          <i data-lucide="youtube" class="w-12 h-12 md:w-16 md:h-16 opacity-20"></i>
          <p class="text-sm md:text-base">目前沒有影片。請前往「建立清單」加入影片！</p>
        </div>
      </div>
      
      <!-- 播放控制列 -->
      <div class="shrink-0 bg-gray-900 rounded-xl p-2 md:p-4 flex flex-col md:flex-row items-center justify-between mt-3 md:mt-6 shadow-lg border border-gray-800 gap-2 md:gap-0 relative">
        <div class="w-full md:w-1/3 flex items-center justify-center md:justify-start gap-2 md:gap-3" id="now-playing-info"></div>
        <div class="w-full md:w-2/3 flex items-center justify-between relative">
          <div class="w-1/4 md:hidden"></div>
          <div class="flex-1 md:flex-none flex items-center justify-center gap-4 md:gap-6 md:absolute md:left-1/2 md:-translate-x-1/2">
            <button onclick="playPrev()" class="p-2 text-gray-400 hover:text-white hover:bg-gray-800 rounded-full transition"><i data-lucide="skip-back" class="w-5 h-5 md:w-6 h-6"></i></button>
            <button id="btn-toggle-play" onclick="togglePlay()" class="w-12 h-12 md:w-14 md:h-14 bg-red-600 rounded-full flex items-center justify-center text-white hover:bg-red-500 transition shadow-[0_0_15px_rgba(220,38,38,0.5)]">
              <i data-lucide="play" class="w-6 h-6 md:w-7 md:h-7 ml-1"></i>
            </button>
            <button onclick="playNext()" class="p-2 text-gray-400 hover:text-white hover:bg-gray-800 rounded-full transition"><i data-lucide="skip-forward" class="w-5 h-5 md:w-6 h-6"></i></button>
          </div>
          <div class="w-1/4 md:w-auto flex justify-end">
            <button onclick="togglePlayMode()" id="btn-playmode" class="flex items-center justify-center gap-1 md:gap-2 px-2 py-1.5 md:px-4 md:py-2 bg-gray-800 rounded-lg text-[10px] sm:text-xs md:text-sm text-gray-300 hover:text-white hover:bg-gray-700 transition"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. 建立播放清單分頁 -->
    <div id="view-build" class="view-container view-hidden flex flex-col md:flex-row p-3 md:p-6 gap-3 md:gap-6 w-full">
      <div class="w-full md:w-1/2 flex-1 flex flex-col bg-gray-900/80 rounded-xl border border-gray-800 p-3 md:p-5 shadow-lg min-h-0">
        <h2 class="text-base md:text-xl font-bold mb-3 flex items-center gap-2 text-gray-100"><i data-lucide="search" class="text-blue-400 w-5 h-5"></i> 從影片庫搜尋</h2>
        <div class="flex gap-2 mb-3 shrink-0">
          <input type="text" id="search-input" oninput="renderSearch()" placeholder="輸入關鍵字..." class="flex-1 bg-gray-950 border border-gray-700 text-gray-100 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
          <button onclick="addAllFiltered()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded-lg transition font-medium whitespace-nowrap shadow-lg text-sm">全部加入</button>
        </div>
        <div id="search-results" class="flex-1 overflow-y-auto pr-1 space-y-2 custom-scrollbar"></div>
      </div>

      <div class="w-full md:w-1/2 flex-1 flex flex-col bg-gray-900/80 rounded-xl border border-gray-800 p-3 md:p-5 shadow-lg min-h-0">
        <div class="flex items-center justify-between mb-3 shrink-0">
          <h2 class="text-base md:text-xl font-bold flex items-center gap-2 text-gray-100"><i data-lucide="list-video" class="text-red-500 w-5 h-5"></i> 播放清單 (<span id="playlist-count">0</span>)</h2>
          <button onclick="clearPlaylist()" class="text-xs md:text-sm text-gray-400 hover:text-red-400 transition flex items-center gap-1 px-2 py-1 rounded hover:bg-gray-800">
            <i data-lucide="trash-2" class="icon-sm"></i> 全部清空
          </button>
        </div>
        <div id="playlist-container" class="flex-1 overflow-y-auto pr-1 space-y-2 custom-scrollbar"></div>
      </div>
    </div>

    <!-- 3. 影片庫分頁 -->
    <div id="view-library" class="view-container view-hidden overflow-y-auto p-3 md:p-6 flex flex-col items-center">
      <div class="max-w-5xl w-full h-full flex flex-col">
        <h2 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 flex items-center gap-2"><i data-lucide="search" class="text-green-500 w-6 h-6"></i> 總影片庫管理</h2>
        
        <div class="bg-gray-900 rounded-xl border border-gray-800 p-4 md:p-6 mb-4 md:mb-6 shadow-lg shrink-0">
          <h3 class="text-sm md:text-lg font-medium mb-3 flex items-center gap-2 text-gray-200"><i data-lucide="link" class="w-4 h-4 md:w-5 md:h-5"></i> 手動加入 YouTube 影片</h3>
          <div class="flex flex-col sm:flex-row gap-2 md:gap-3">
            <input type="text" id="manual-url" placeholder="貼上 YouTube 網址..." class="flex-1 bg-gray-950 border border-gray-700 text-gray-100 rounded-lg px-3 py-2 md:px-4 md:py-3 focus:outline-none focus:border-green-500 transition font-mono text-xs md:text-sm" onkeydown="if(event.key === 'Enter') addManualVideo()">
            <button id="btn-add-manual" onclick="addManualVideo()" class="bg-green-600 hover:bg-green-500 disabled:bg-gray-700 text-white px-4 md:px-6 py-2 md:py-3 rounded-lg transition font-medium whitespace-nowrap flex justify-center items-center gap-2 shadow-lg text-sm md:text-base">
              <i data-lucide="plus" class="icon-md" id="add-manual-icon"></i> <span id="add-manual-text">加入</span>
            </button>
          </div>
        </div>

        <div class="flex-1 bg-gray-900 rounded-xl border border-gray-800 p-4 md:p-6 overflow-hidden flex flex-col shadow-lg min-h-[400px]">
           <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 shrink-0 gap-3">
               <div class="flex items-center gap-3">
                 <h3 class="text-sm md:text-lg font-medium text-gray-200">已儲存影片 (<span id="library-count">0</span>)</h3>
                 <!-- 清空分類按鈕 -->
                 <button onclick="clearCurrentCategory()" class="text-xs text-red-400 hover:text-white hover:bg-red-600 transition flex items-center gap-1 bg-red-900/30 px-2 py-1 rounded border border-red-800/50 shadow-sm" title="一鍵清空目前分類的影片">
                   <i data-lucide="trash-2" class="icon-sm"></i> <span>清空此分類</span>
                 </button>
               </div>
               <span class="text-[10px] md:text-xs text-gray-500 hidden sm:inline">資料儲存在您的瀏覽器中</span>
           </div>
           
           <div id="library-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar shrink-0"></div>
           <div id="library-grid" class="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4 pb-10 content-start"></div>
        </div>
      </div>
    </div>

    <!-- 4. 設定與同步分頁 -->
    <div id="view-settings" class="view-container view-hidden overflow-y-auto p-4 md:p-6 flex flex-col items-center">
      <div class="max-w-4xl w-full">
        <h2 class="text-xl md:text-2xl font-bold mb-6 flex items-center gap-2"><i data-lucide="settings" class="text-gray-400 w-6 h-6"></i> 設定與同步</h2>
        
        <div class="bg-gray-900 rounded-xl border border-gray-800 p-4 md:p-6 mb-6 shadow-lg">
          <h3 class="text-base md:text-lg font-bold mb-2 flex items-center gap-2 text-white"><i data-lucide="youtube" class="text-red-500 w-5 h-5"></i> 自動同步 @famidoc</h3>
          <p class="text-gray-400 text-xs md:text-sm mb-4">若要自動抓取頻道影片，請提供 API Key。密鑰安全儲存於本地端。</p>
          
          <div class="flex flex-col gap-3">
            <div>
              <input type="password" id="api-key-input" oninput="saveSettings()" placeholder="輸入 API Key: AIzaSy..." class="w-full bg-gray-950 border border-gray-700 text-gray-100 rounded-lg px-4 py-2 md:py-3 focus:outline-none focus:border-red-500 transition font-mono text-sm">
            </div>
            <button id="btn-sync" onclick="syncChannel()" class="bg-red-600 hover:bg-red-500 text-white px-4 md:px-6 py-2 md:py-3 rounded-lg transition font-medium flex items-center justify-center gap-2 w-full sm:w-auto shadow-lg text-sm md:text-base">
              <i data-lucide="refresh-cw" class="icon-md" id="sync-icon"></i> <span id="sync-text">立即同步頻道影片</span>
            </button>
          </div>
        </div>

        <div class="bg-gray-900 rounded-xl border border-gray-800 p-4 md:p-6 shadow-lg">
          <h3 class="text-base md:text-lg font-bold mb-2 flex items-center gap-2 text-white"><i data-lucide="save" class="text-blue-400 w-5 h-5"></i> 備份與還原</h3>
          <p class="text-gray-400 text-xs md:text-sm mb-4">建議將影片庫匯出為 JSON 檔案妥善保存。</p>
          
          <div class="flex flex-col sm:flex-row gap-3">
            <button onclick="exportJSON()" class="bg-gray-800 hover:bg-gray-700 text-gray-200 px-4 md:px-6 py-2 md:py-3 rounded-lg transition font-medium flex items-center justify-center gap-2 border border-gray-700 text-sm md:text-base">
              <i data-lucide="download" class="icon-md"></i> 匯出 JSON
            </button>
            <label class="bg-gray-800 hover:bg-gray-700 text-gray-200 px-4 md:px-6 py-2 md:py-3 rounded-lg transition font-medium flex items-center justify-center gap-2 cursor-pointer border border-gray-700 text-sm md:text-base">
              <i data-lucide="upload" class="icon-md"></i> 匯入 JSON
              <input type="file" id="import-json" accept=".json" onchange="importJSON(event)" class="hidden" />
            </label>
          </div>
        </div>
        
        <!-- App Footer -->
        <div class="mt-8 mb-4 text-center text-xs text-gray-600">
          @2026 by Famidoc Chang & Gemini 3.1 pro
        </div>

      </div>
    </div>
  </div>

  <!-- ================= JavaScript 核心邏輯 ================= -->
  <script>
    // --- 0. Service Worker 背景緩存清理 ---
    if ('serviceWorker' in navigator) {
      try {
        navigator.serviceWorker.getRegistrations()
          .then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister().catch(err => console.warn('取消註冊失敗:', err));
            }
          }).catch(err => {});
      } catch (error) {}
    }

    // --- 1. 狀態與資料清洗 ---
    function sanitizeData(list) {
      if (!Array.isArray(list)) return [];
      return list
        .filter(v => v !== null && typeof v === 'object' && v.id)
        .map(v => ({
            id: String(v.id).trim(),
            title: v.title ? String(v.title).trim() : '未知影片',
            thumbnail: v.thumbnail ? String(v.thumbnail).trim() : `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`,
            channelName: v.channelName ? String(v.channelName).trim() : '特選影片'
        }));
    }

    let savedSettings = { apiKey: '' };
    try {
      const parsed = JSON.parse(localStorage.getItem('famidoc_settings'));
      if (parsed && typeof parsed === 'object') {
        savedSettings = parsed;
      }
    } catch(e) {}

    let state = {
      masterList: sanitizeData(JSON.parse(localStorage.getItem('famidoc_master')) || []),
      playlist: sanitizeData(JSON.parse(localStorage.getItem('famidoc_playlist')) || []),
      currentIndex: parseInt(localStorage.getItem('famidoc_idx')) || 0,
      playMode: localStorage.getItem('famidoc_mode') || 'sequential',
      settings: savedSettings
    };
    
    let activeLibraryTab = '全部';

    function saveState(key, value) {
      if (key === 'masterList') localStorage.setItem('famidoc_master', JSON.stringify(value));
      if (key === 'playlist') localStorage.setItem('famidoc_playlist', JSON.stringify(value));
      if (key === 'currentIndex') localStorage.setItem('famidoc_idx', value);
      if (key === 'playMode') localStorage.setItem('famidoc_mode', value);
      if (key === 'settings') localStorage.setItem('famidoc_settings', JSON.stringify(value));
    }

    function escapeHTML(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // --- 2. YouTube Iframe API 初始化與控制 ---
    let player;
    let isPlayerReady = false;

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
      const initialVideoId = state.playlist[state.currentIndex]?.id || '';
      player = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        videoId: initialVideoId,
        playerVars: { 'autoplay': 1, 'enablejsapi': 1, 'rel': 0 },
        events: {
          'onReady': () => { isPlayerReady = true; checkPlayerVisibility(); },
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        updatePlayPauseUI(true);
      } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED || event.data === YT.PlayerState.UNSTARTED) {
        updatePlayPauseUI(false);
      }
      if (event.data === YT.PlayerState.ENDED) handleVideoEnd();
    }

    function handleVideoEnd() {
      if (state.playlist.length === 0) return;
      if (state.playMode === 'repeat-single') {
        player.seekTo(0); player.playVideo();
      } else if (state.playMode === 'shuffle') {
        playVideoByIndex(Math.floor(Math.random() * state.playlist.length));
      } else {
        playVideoByIndex((state.currentIndex < state.playlist.length - 1) ? state.currentIndex + 1 : 0);
      }
    }

    // --- 3. 播放控制邏輯 ---
    function playVideoByIndex(index) {
      if (state.playlist.length === 0) return;
      state.currentIndex = index;
      saveState('currentIndex', index);
      const videoId = state.playlist[index]?.id;
      if (videoId && isPlayerReady && player && player.loadVideoById) {
        player.loadVideoById(videoId);
      }
      updateAllUI();
    }

    function playNext() {
      if (state.playlist.length === 0) return;
      playVideoByIndex(state.playMode === 'shuffle' ? Math.floor(Math.random() * state.playlist.length) : (state.currentIndex < state.playlist.length - 1 ? state.currentIndex + 1 : 0));
    }

    function playPrev() {
      if (state.playlist.length === 0) return;
      playVideoByIndex(state.playMode === 'shuffle' ? Math.floor(Math.random() * state.playlist.length) : (state.currentIndex > 0 ? state.currentIndex - 1 : state.playlist.length - 1));
    }

    function togglePlay() {
      if (isPlayerReady && player && typeof player.getPlayerState === 'function') {
        player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
      } else {
        alert('播放器尚未連線！請在伺服器環境執行。');
      }
    }

    function updatePlayPauseUI(isPlaying) {
      const btn = document.getElementById('btn-toggle-play');
      if (btn) {
        btn.innerHTML = isPlaying ? `<i data-lucide="pause" class="w-6 h-6 md:w-7 md:h-7"></i>` : `<i data-lucide="play" class="w-6 h-6 md:w-7 md:h-7 ml-1"></i>`;
        lucide.createIcons();
      }
    }

    function togglePlayMode() {
      const modes = ['sequential', 'repeat-single', 'shuffle'];
      state.playMode = modes[(modes.indexOf(state.playMode) + 1) % 3];
      saveState('playMode', state.playMode);
      updatePlayModeUI();
    }

    // --- 4. 畫面渲染與 UI 更新 (100% 無 inline style 版) ---
    document.addEventListener("DOMContentLoaded", () => {
      // 安全檢查：確保元素存在再賦值，防止載入時引發 Cannot set properties of null 錯誤
      const apiKeyInput = document.getElementById('api-key-input');
      const syncChannelInput = document.getElementById('sync-channel-input');
      
      if (apiKeyInput && state.settings) {
        apiKeyInput.value = state.settings.apiKey || '';
      }
      
      if (syncChannelInput) {
        // 設定預設頻道代號
        syncChannelInput.value = '@famidoc';
      }

      updateAllUI();
      switchTab('player');
    });

    function updateAllUI() {
      renderLibrary();
      renderSearch();
      renderPlaylist();
      updatePlayerUI();
      updatePlayModeUI();
      lucide.createIcons();
    }

    function updatePlayerUI() {
      const currentVideo = state.playlist[state.currentIndex];
      const infoContainer = document.getElementById('now-playing-info');
      const noVideoMsg = document.getElementById('no-video-msg');
      const ytPlayerDiv = document.getElementById('yt-player');

      if (currentVideo && currentVideo.id) {
        infoContainer.innerHTML = `
          <img src="${escapeHTML(currentVideo.thumbnail)}" class="fc-np-img shadow" />
          <div class="fc-np-box">
            <h3 class="fc-np-title" title="${escapeHTML(currentVideo.title)}">${escapeHTML(currentVideo.title)}</h3>
            <p class="fc-np-sub">目前播放: ${state.currentIndex + 1} / ${state.playlist.length} | ${escapeHTML(currentVideo.channelName)}</p>
          </div>
        `;
        noVideoMsg.classList.add('hidden');
        ytPlayerDiv.style.opacity = '1';
      } else {
        infoContainer.innerHTML = '';
        noVideoMsg.classList.remove('hidden');
        ytPlayerDiv.style.opacity = '0';
        updatePlayPauseUI(false);
        if (isPlayerReady && player && player.stopVideo) player.stopVideo();
      }
    }

    function updatePlayModeUI() {
      const btn = document.getElementById('btn-playmode');
      if (state.playMode === 'sequential') {
        btn.innerHTML = `<i data-lucide="arrow-right" class="icon-sm"></i> <span class="hidden md:inline">循序播放</span><span class="md:hidden">循序</span>`;
      } else if (state.playMode === 'repeat-single') {
        btn.innerHTML = `<i data-lucide="repeat-1" class="icon-sm"></i> <span class="hidden md:inline">單曲循環</span><span class="md:hidden">單曲</span>`;
      } else {
        btn.innerHTML = `<i data-lucide="shuffle" class="icon-sm"></i> <span class="hidden md:inline">隨機播放</span><span class="md:hidden">隨機</span>`;
      }
      lucide.createIcons();
    }

    function renderLibrary() {
      document.getElementById('library-count').innerText = state.masterList.length;
      const grid = document.getElementById('library-grid');
      const tabsContainer = document.getElementById('library-tabs');
      
      const channels = ['全部', '特選影片', ...new Set(state.masterList.map(v => v.channelName).filter(c => c !== '特選影片' && c))];
      
      tabsContainer.innerHTML = '';
      if (state.masterList.length > 0) {
        let tabsHtml = '';
        channels.forEach(ch => {
            const isActive = ch === activeLibraryTab;
            const btnClass = isActive ? 'fc-tab-active' : 'fc-tab-inactive';
            tabsHtml += `<button class="${btnClass}" onclick="activeLibraryTab='${ch}'; renderLibrary();">${ch}</button>`;
        });
        tabsContainer.innerHTML = tabsHtml;
      }

      if (state.masterList.length === 0) {
        grid.innerHTML = `
          <div class="fc-empty-state">
             <i data-lucide="search" class="icon-xl mb-4 opacity-20"></i>
             <p class="text-sm md:text-base">影片庫目前是空的。請在上方貼上網址，或是前往「設定與同步」匯入資料。</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      const displayList = activeLibraryTab === '全部' ? state.masterList : state.masterList.filter(v => v.channelName === activeLibraryTab);

      if (displayList.length === 0) {
         grid.innerHTML = `<div class="fc-empty-state"><p class="text-sm md:text-base">此分類目前沒有影片。</p></div>`;
         return;
      }

      let html = '';
      displayList.forEach(video => {
        html += `
          <div class="fc-grid-card group">
             <div class="fc-thumb-container">
                <img src="${escapeHTML(video.thumbnail)}" class="fc-thumb" onerror="this.src='https://img.youtube.com/vi/${escapeHTML(video.id)}/hqdefault.jpg'" />
                <div class="fc-overlay">
                   <button onclick="addObjToPlaylist('${escapeHTML(video.id)}')" class="fc-btn-circle fc-btn-blue" title="加入播放清單">
                     <i data-lucide="plus" class="icon-md"></i>
                   </button>
                   <button onclick="deleteFromMaster('${escapeHTML(video.id)}')" class="fc-btn-circle fc-btn-red" title="刪除">
                     <i data-lucide="trash-2" class="icon-md"></i>
                   </button>
                </div>
             </div>
             <div class="fc-card-info">
                <h4 class="fc-card-title" title="${escapeHTML(video.title)}">${escapeHTML(video.title)}</h4>
                <span class="fc-tag">${escapeHTML(video.channelName)}</span>
             </div>
          </div>
        `;
      });
      grid.innerHTML = html;
      lucide.createIcons();
    }

    function renderSearch() {
      const searchInput = document.getElementById('search-input');
      if (!searchInput) return;
      const query = searchInput.value.toLowerCase();
      const container = document.getElementById('search-results');
      if (!container) return;

      const filtered = state.masterList.filter(v => v.title.toLowerCase().includes(query));
      
      if (filtered.length === 0) {
        container.innerHTML = `<p class="fc-empty-state" style="padding-top:2.5rem; padding-bottom:2.5rem; font-size:0.875rem;">找不到符合關鍵字的影片</p>`;
        return;
      }

      let html = '';
      filtered.forEach(video => {
        html += `
          <div class="fc-list-item">
            <div class="fc-list-thumb-lg">
                <img src="${escapeHTML(video.thumbnail)}" class="fc-thumb" />
            </div>
            <div class="fc-list-info">
              <h4 class="fc-list-title">${escapeHTML(video.title)}</h4>
              <span class="fc-list-tag">${escapeHTML(video.channelName)}</span>
            </div>
            <button onclick="addObjToPlaylist('${escapeHTML(video.id)}')" class="fc-btn-circle fc-btn-blue fc-btn-sm" title="加入清單">
              <i data-lucide="plus" class="icon-md"></i>
            </button>
          </div>
        `;
      });
      container.innerHTML = html;
      lucide.createIcons();
    }

    function renderPlaylist() {
      const countEl = document.getElementById('playlist-count');
      if (countEl) countEl.innerText = state.playlist.length;
      const container = document.getElementById('playlist-container');
      if (!container) return;

      if (state.playlist.length === 0) {
        container.innerHTML = `
          <div class="fc-empty-state" style="height: 100%;">
             <i data-lucide="list-video" class="icon-xl mb-4 opacity-20"></i>
             <p class="text-sm">播放清單空空如也，從左側加入影片吧！</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      let html = '';
      state.playlist.forEach((video, idx) => {
        const isActive = idx === state.currentIndex;
        const activeClass = isActive ? 'active' : '';
        
        html += `
          <div class="fc-list-item ${activeClass}">
            <span class="fc-idx">${idx + 1}</span>
            <div class="fc-list-thumb-sm">
                <img src="${escapeHTML(video.thumbnail)}" class="fc-thumb" />
            </div>
            <div class="fc-list-info">
              <h4 class="fc-list-title ${activeClass}">${escapeHTML(video.title)}</h4>
            </div>
            <div class="fc-list-actions">
              <button onclick="playVideoByIndex(${idx}); switchTab('player');" class="fc-icon-btn play ${activeClass}" title="立即播放">
                <i data-lucide="play" class="icon-sm"></i>
              </button>
              <button onclick="removeFromPlaylist(${idx})" class="fc-icon-btn del" title="移除">
                <i data-lucide="x" class="icon-sm"></i>
              </button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      lucide.createIcons();
    }

    // --- 5. 清單操作邏輯 ---
    function addObjToPlaylist(id) {
      const video = state.masterList.find(v => v.id === id);
      if (video) {
        state.playlist.push(video);
        saveState('playlist', state.playlist);
        if (state.playlist.length === 1) playVideoByIndex(0);
        else updateAllUI();
      }
    }

    function addAllFiltered() {
      const searchInput = document.getElementById('search-input');
      if (!searchInput) return;
      const query = searchInput.value.toLowerCase();
      const filtered = state.masterList.filter(v => v.title.toLowerCase().includes(query));
      state.playlist = [...state.playlist, ...filtered];
      saveState('playlist', state.playlist);
      if (state.currentIndex >= state.playlist.length) state.currentIndex = 0;
      updateAllUI();
    }

    function removeFromPlaylist(index) {
      state.playlist.splice(index, 1);
      if (state.currentIndex >= index && state.currentIndex > 0) {
        state.currentIndex -= 1;
      }
      saveState('playlist', state.playlist);
      saveState('currentIndex', state.currentIndex);
      
      if (state.playlist.length === 0) {
        updateAllUI();
        if (isPlayerReady && player && player.stopVideo) player.stopVideo();
      } else {
        if(index === state.currentIndex + 1 || index === state.currentIndex) {
             playVideoByIndex(state.currentIndex);
        } else {
             updateAllUI();
        }
      }
    }

    function clearPlaylist() {
      state.playlist = [];
      state.currentIndex = 0;
      saveState('playlist', state.playlist);
      saveState('currentIndex', state.currentIndex);
      updateAllUI();
      if (isPlayerReady && player && player.stopVideo) player.stopVideo();
    }

    function deleteFromMaster(id) {
      if (confirm('確定要從影片庫刪除這部影片嗎？')) {
        state.masterList = state.masterList.filter(v => v.id !== id);
        saveState('masterList', state.masterList);
        
        state.playlist = state.playlist.filter(v => v.id !== id);
        if(state.currentIndex >= state.playlist.length) state.currentIndex = 0;
        saveState('playlist', state.playlist);
        saveState('currentIndex', state.currentIndex);
        
        updateAllUI();
      }
    }

    // --- 一鍵清空目前分類 ---
    function clearCurrentCategory() {
      if (state.masterList.length === 0) return;
      
      const msg = activeLibraryTab === '全部' 
        ? '⚠️ 警告：確定要清空【全部】的影片嗎？這將會刪除您影片庫中的所有資料庫！' 
        : `確定要清空分類【${activeLibraryTab}】的所有影片嗎？`;
        
      if (confirm(msg)) {
        if (activeLibraryTab === '全部') {
          state.masterList = [];
          state.playlist = [];
          state.currentIndex = 0;
        } else {
          const videosToDelete = state.masterList.filter(v => v.channelName === activeLibraryTab).map(v => v.id);
          state.masterList = state.masterList.filter(v => v.channelName !== activeLibraryTab);
          state.playlist = state.playlist.filter(v => !videosToDelete.includes(v.id));
          if(state.currentIndex >= state.playlist.length) state.currentIndex = 0;
        }
        
        activeLibraryTab = '全部';
        saveState('masterList', state.masterList);
        saveState('playlist', state.playlist);
        saveState('currentIndex', state.currentIndex);
        updateAllUI();
        alert('分類清空完成！');
      }
    }

    // --- 6. 影片庫新增邏輯 ---
    async function addManualVideo() {
      const input = document.getElementById('manual-url');
      if (!input) return;
      const url = input.value.trim();
      if (!url) return;

      const btn = document.getElementById('btn-add-manual');
      const text = document.getElementById('add-manual-text');
      if (btn) btn.disabled = true;
      if (text) text.innerText = "抓取中...";

      let videoId = url;
      if (url.includes('v=')) videoId = new URLSearchParams(url.split('?')[1]).get('v');
      else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
      
      if (!videoId || videoId.length < 10) {
        alert('無效的 YouTube 網址！');
        resetManualBtn();
        return;
      }

      if (state.masterList.some(v => v.id === videoId)) {
        alert('這部影片已經在您的影片庫中了！');
        resetManualBtn();
        if (input) input.value = '';
        return;
      }

      try {
        const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
        const data = await res.json();
        
        const newVideo = {
          id: videoId,
          title: data.title || `新增影片 (${videoId})`,
          thumbnail: data.thumbnail_url || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
          channelName: '特選影片'
        };
        
        state.masterList.unshift(newVideo);
        saveState('masterList', state.masterList);
        if (input) input.value = '';
        updateAllUI();
        alert('加入成功！');
      } catch(e) {
        const newVideo = { id: videoId, title: `影片 (${videoId})`, thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`, channelName: '特選影片' };
        state.masterList.unshift(newVideo);
        saveState('masterList', state.masterList);
        if (input) input.value = '';
        updateAllUI();
      } finally {
        resetManualBtn();
      }
    }

    function resetManualBtn() {
      const btn = document.getElementById('btn-add-manual');
      const text = document.getElementById('add-manual-text');
      if (btn) btn.disabled = false;
      if (text) text.innerText = "加入";
    }

    // --- 7. 設定與 YouTube API 同步邏輯 ---
    function saveSettings() {
      const apiKeyInput = document.getElementById('api-key-input');
      if (apiKeyInput) {
        state.settings.apiKey = apiKeyInput.value;
        saveState('settings', state.settings);
      }
    }

    async function syncChannel() {
      if (!state.settings || !state.settings.apiKey) {
        alert("請先輸入 YouTube API Key");
        return;
      }

      const syncChannelInput = document.getElementById('sync-channel-input');
      const targetChannel = syncChannelInput ? syncChannelInput.value.trim() : '';
      if (!targetChannel) { alert("請輸入要同步的目標頻道代號！"); return; }

      const btn = document.getElementById('btn-sync');
      const text = document.getElementById('sync-text');
      if (btn) btn.disabled = true;
      if (text) text.innerText = "正在通訊抓取資料...";

      try {
        const res1 = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(targetChannel)}&type=channel&key=${state.settings.apiKey}`);
        const data1 = await res1.json();
        if (data1.error) throw new Error(data1.error.message);
        if (!data1.items || data1.items.length === 0) throw new Error(`找不到頻道 ${targetChannel}，請確認代號是否正確。`);
        
        const channelId = data1.items[0].snippet.channelId;
        const actualChannelTitle = data1.items[0].snippet.channelTitle;
        const uploadsId = channelId.replace('UC', 'UU');
        
        let allVideos = [];
        let pageToken = '';
        do {
          const res2 = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${uploadsId}&key=${state.settings.apiKey}${pageToken ? `&pageToken=${pageToken}` : ''}`);
          const data2 = await res2.json();
          if (data2.items) {
            const fetched = data2.items.map(item => {
              const vid = item.snippet.resourceId.videoId;
              return {
                id: vid,
                title: item.snippet.title || '未知影片',
                thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || `https://img.youtube.com/vi/${vid}/mqdefault.jpg`,
                channelName: actualChannelTitle
              };
            });
            allVideos = [...allVideos, ...fetched];
          }
          pageToken = data2.nextPageToken;
        } while (pageToken);
        
        const map = new Map();
        state.masterList.forEach(v => map.set(v.id, v));
        allVideos.forEach(v => map.set(v.id, v));
        state.masterList = Array.from(map.values());
        
        saveState('masterList', state.masterList);
        updateAllUI();
        alert(`同步成功！已為您抓取 ${allVideos.length} 部影片。`);

      } catch(e) {
        alert("同步失敗: " + e.message);
      } finally {
        if (btn) btn.disabled = false;
        if (text) text.innerText = "立即同步頻道影片";
      }
    }

    function exportJSON() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.masterList));
      const node = document.createElement('a');
      node.setAttribute("href", dataStr);
      node.setAttribute("download", "my_yt_player_backup.json");
      document.body.appendChild(node);
      node.click();
      node.remove();
    }

    function importJSON(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const imported = JSON.parse(event.target.result);
          if (Array.isArray(imported)) {
            const map = new Map();
            state.masterList.forEach(v => map.set(v.id, v));
            imported.forEach(v => {
              if (v.id && v.title) {
                 v.channelName = v.channelName || '特選影片';
                 map.set(v.id, v);
              }
            });
            state.masterList = Array.from(map.values());
            saveState('masterList', state.masterList);
            updateAllUI();
            alert('資料匯入成功！');
          } else {
             alert('檔案格式錯誤。');
          }
        } catch(err) {
          alert('無效的 JSON 檔案');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    // --- 8. UI 分頁切換 ---
    function switchTab(tabId) {
      ['player', 'build', 'library', 'settings'].forEach(id => {
        const viewEl = document.getElementById(`view-${id}`);
        if (viewEl) {
            viewEl.classList.replace('view-active', 'view-hidden');
        }
        
        const navBtn = document.getElementById(`nav-${id}`);
        if (navBtn) {
            if(id === tabId) {
              navBtn.className = "w-full flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 px-1 md:px-4 py-2 md:py-3 rounded-lg transition font-medium bg-red-600/10 text-red-500";
            } else {
              navBtn.className = "w-full flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 px-1 md:px-4 py-2 md:py-3 rounded-lg transition font-medium text-gray-400 hover:bg-gray-800 hover:text-gray-200";
            }
        }
      });
      
      const activeView = document.getElementById(`view-${tabId}`);
      if (activeView) {
          activeView.classList.replace('view-hidden', 'view-active');
      }
      checkPlayerVisibility();
    }
